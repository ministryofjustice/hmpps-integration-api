repos:
  - repo: local
    hooks:
      - id: ktlint-format
        name: Formatting
        entry: ./gradlew ktlintFormat
        language: system
        types: [kotlin]
        stages: [pre-commit]
        always_run: true
        pass_filenames: false

      - id: ktlint-check
        name: Linting
        entry: ./gradlew ktlintCheck
        language: system
        types: [kotlin]
        stages: [pre-commit]
        always_run: true
        pass_filenames: false

  - repo: https://github.com/ministryofjustice/devsecops-hooks
    rev: 53d252e406bae2bbbd0c0f3205b72870a02c9b3f
    hooks:
      - id: baseline
