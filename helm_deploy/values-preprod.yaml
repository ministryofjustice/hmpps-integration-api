---
# Per environment values which override defaults in hmpps-integration-api/values.yaml

generic-service:
  replicaCount: 2

  ingress:
    host: hmpps-integration-api-preprod.apps.live.cloud-platform.service.justice.gov.uk
    annotations:
      nginx.ingress.kubernetes.io/auth-tls-secret: "hmpps-integration-api-preprod/client-certificate-auth"
    modsecurity_enabled: true
    modsecurity_github_team: "hmpps-integration-api"
    modsecurity_snippet: |
      SecAuditEngine On
      SecRuleEngine On
      SecDefaultAction "phase:2,pass,log,tag:github_team=hmpps-integration-api,tag:namespace={{ .Release.Namespace }}"
      # Default is only GET HEAD POST OPTIONS so need to include PUT.
      SecAction "id:900200,phase:1,nolog,pass,t:none,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT"

  poddisruptionbudget:
    enabled: false

  env:
    SPRING_PROFILES_ACTIVE: preprod
    SENTRY_ENVIRONMENT: preprod

  namespace_secrets:
    hmpps-auth:
      CLIENT_ID: "client-id"
      CLIENT_SECRET: "client-secret"
    other-services:
      APPINSIGHTS_INSTRUMENTATIONKEY: "azure-app-insights"
      SENTRY_DSN: "sentry"

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  alertSeverity: hmpps-integration-api-alerts
  sqsAlertsQueueNames:
    - "book-a-prison-visit-preprod-hmpps_prison_visits_write_events_queue"
    - "book-a-prison-visit-preprod-hmpps_prison_visits_write_events_dlq"
    - "locations-inside-prison-preprod-update_from_external_system_events_queue"
    - "locations-inside-prison-preprod-update_from_external_system_events_dlq"
    - "activities-and-appointments-preprod-update_from_external_system_events_queue"
    - "activities-and-appointments-preprod-update_from_external_system_events_dlq"
  sqsAlertsOldestThreshold: 1
  sqsAlertsTotalMessagesThreshold: 1
