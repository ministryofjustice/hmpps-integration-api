  core-person-record:
    base-url: https://hmpps-person-record-preprod.hmpps.service.justice.gov.uk

feature-flag:
  # API Config
  course-completion-event-enabled: false
  use-active-alerts-endpoint: false
  use-contact-events-endpoint: false
  use-emergency-contacts-endpoint: false
  epf-endpoint-includes-lao: true
  epf-gateway-disabled: true
  cpr-enabled: true
  gateway-cache-enabled: true
  use-webclient-wrapper-for-hmpps-auth: false
  # Events Config
  enable-delete-processed-events: true
  enable-publish-pending-events: true
  enable-domain-events-queue-listener: true
  enable-subscription-filter-policy-updater: true
  person-languages-changed-notifications-enabled: true
  prisoner-base-location-changed-notifications-enabled: true
  prisoner-merge-notifications-enabled: false
  contact-events-notifications-enabled: false
  limited-access-notifications-enabled: true
  deduplicate-events: true

authorisation:
  consumers:
    ctrlo:
      notes: "See client list in Confluence"
      roles:
        - "status-only"
      queueName: "ctrlosubscriberqueue"
    moj-pes:
      notes: "See client list in Confluence"
      roles:
        - "status-only"
    kubernetes-health-check-client:
      notes: "Kubernetes cluster automated healthchecks"
      roles:
        - "hmpps-system"
    event-service:
      notes: "HMPPS External Events service"
      roles:
        - "hmpps-system"
    meganexus:
      notes: "See client list in Confluence"
      roles:
        - "status-only"
      queueName: "plpsubscriberqueue"
    pnd:
      notes: "See client list in Confluence"
      roles:
        - "status-only"
      queueName: "pndsubscriberqueue"
    pmcphee:
      notes: "ExtApi developer"
      roles:
        - "status-only"
    smoke-test:
      notes: "Post-deployment smoke tests"
      roles:
        - "hmpps-system"
    smartinbox:
      notes: "See client list in Confluence"
      roles:
        - "status-only"
    prisonerfacing:
      notes: "See client list in Confluence"
      roles:
        - "status-only"
    enhanced-reception-checks:
      notes: "See client list in Confluence"
      roles:
        - "enhanced-reception-checks"

hmpps.sqs:
  queues:
    hmppsdomainqueue:
      queueName: ${HMPPS_DOMAIN_QUEUE_NAME}
      queueArn: ${HMPPS_DOMAIN_QUEUE_ARN}
      dlqName: ${HMPPS_DOMAIN_DL_QUEUE_NAME}
      subscribeTopicId: domainevents
    plpsubscriberqueue:
      queueName: ${PLP_QUEUE_NAME}
      queueArn: ${PLP_QUEUE_ARN}
      subscribeTopicId: integrationeventtopic
    pndsubscriberqueue:
      queueName: ${PND_QUEUE_NAME}
      queueArn: ${PND_QUEUE_ARN}
      subscribeTopicId: integrationeventtopic
    ctrlosubscriberqueue:
      queueName: ${CTRLO_QUEUE_NAME}
      queueArn: ${CTRLO_QUEUE_ARN}
      subscribeTopicId: integrationeventtopic
