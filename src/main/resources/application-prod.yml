services:
  int-api:
    base-url: https://integration-api.hmpps.service.justice.gov.uk
  prison-api:
    base-url: https://prison-api.prison.service.justice.gov.uk
  prisoner-offender-search:
    base-url: https://prisoner-search.prison.service.justice.gov.uk
  ndelius:
    base-url: https://external-api-and-delius.hmpps.service.justice.gov.uk
  assess-risks-and-needs:
    base-url: https://assess-risks-and-needs.hmpps.service.justice.gov.uk
  probation-integration-epf:
    base-url: https://external-api-and-delius.hmpps.service.justice.gov.uk
  adjudications:
    base-url: https://manage-adjudications-api.hmpps.service.justice.gov.uk
  create-and-vary-licence:
    base-url: https://create-and-vary-a-licence-api.hmpps.service.justice.gov.uk
  case-notes:
    base-url: https://offender-case-notes.service.justice.gov.uk
  manage-pom-case-api:
    base-url: https://moic.service.justice.gov.uk
  plp:
    base-url: https://learningandworkprogress-api.hmpps.service.justice.gov.uk
  san:
    base-url: https://support-for-additional-needs-api.hmpps.service.justice.gov.uk
  non-associations:
    base-url: https://non-associations-api.hmpps.service.justice.gov.uk
  manage-prison-visits:
    base-url: https://hmpps-manage-prison-visits-orchestration.prison.service.justice.gov.uk
  incentives:
    base-url: https://incentives-api.hmpps.service.justice.gov.uk
  alerts:
    base-url: https://alerts-api.hmpps.service.justice.gov.uk
  hmpps-auth:
    base-url: https://sign-in.hmpps.service.justice.gov.uk
    username: ${CLIENT_ID}
    password: ${CLIENT_SECRET}
  locations-inside-prison:
    base-url: https://locations-inside-prison-api.hmpps.service.justice.gov.uk
  health-and-medication:
    base-url: https://health-and-medication-api.hmpps.service.justice.gov.uk
  activities:
    base-url: https://activities-api.prison.service.justice.gov.uk
  prisoner-base-location:
    base-url: https://prisoner-base-location-api.hmpps.service.justice.gov.uk
  core-person-record:
    base-url: https://hmpps-person-record.hmpps.service.justice.gov.uk

feature-flag:
  # API Config
  course-completion-event-enabled: false
  use-active-alerts-endpoint: false
  use-contact-events-endpoint: false
  csra-endpoint: false
  use-emergency-contacts-endpoint: false
  epf-endpoint-includes-lao: true
  epf-gateway-disabled: true
  cpr-enabled: true
  gateway-cache-enabled: true
  use-webclient-wrapper-for-hmpps-auth: false
  # Events Config
  enable-delete-processed-events: true
  enable-publish-pending-events: true
  enable-domain-events-queue-listener: true
  enable-subscription-filter-policy-updater: true
  person-languages-changed-notifications-enabled: true
  prisoner-base-location-changed-notifications-enabled: true
  prisoner-merge-notifications-enabled: false
  contact-events-notifications-enabled: false
  limited-access-notifications-enabled: true
  deduplicate-events: true
  direct-sqs-notifications: true

authorisation:
  consumers:
    ctrlo:
      notes: "See client list in Confluence"
      roles:
        - "ctrlo"
      queueName: "ctrlosubscriberqueue"
    moj-pes:
      notes: "See client list in Confluence"
      roles:
        - "moj-prisoner-education"
    kubernetes-health-check-client:
      notes: "Kubernetes cluster automated healthchecks"
      roles:
        - "hmpps-system"
    event-service:
      notes: "HMPPS External Events service"
      roles:
        - "hmpps-system"
    meganexus:
      notes: "See client list in Confluence"
      roles:
        - "curious"
      queueName: "plpsubscriberqueue"
    pnd:
      notes: "See client list in Confluence"
      roles:
        - "police"
      queueName: "pndsubscriberqueue"
    smoke-test:
      notes: "Post-deployment smoke tests"
      roles:
        - "hmpps-system"
    smartinbox:
      notes: "See client list in Confluence"
      roles:
        - "smartinbox"
    prisonerfacing:
      notes: "See client list in Confluence"
      roles:
        - "moj-prisoner-facing"

hmpps.sqs:
  queues:
    hmppsdomainqueue:
      queueName: ${HMPPS_DOMAIN_QUEUE_NAME}
      queueArn: ${HMPPS_DOMAIN_QUEUE_ARN}
      dlqName: ${HMPPS_DOMAIN_DL_QUEUE_NAME}
      subscribeTopicId: domainevents
    plpsubscriberqueue:
      queueName: ${PLP_QUEUE_NAME}
      queueArn: ${PLP_QUEUE_ARN}
      subscribeTopicId: integrationeventtopic
    pndsubscriberqueue:
      queueName: ${PND_QUEUE_NAME}
      queueArn: ${PND_QUEUE_ARN}
      subscribeTopicId: integrationeventtopic
    ctrlosubscriberqueue:
      queueName: ${CTRLO_QUEUE_NAME}
      queueArn: ${CTRLO_QUEUE_ARN}
      subscribeTopicId: integrationeventtopic
