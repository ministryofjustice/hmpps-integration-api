name: Generate Subscription Filter Policy Files

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  check-filter-policies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.GHA_BOT_APP_ID }}
          private-key: ${{ secrets.GHA_BOT_APP_PRIVATE_KEY }}

      - name: Check subscription policy files
        uses: ./.github/actions/policy-file-generator
        with:
          token: ${{ steps.app-token.outputs.token }}
