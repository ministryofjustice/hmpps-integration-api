name: Generate Subscription Filter Policy Files

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  check-filter-policies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.GHA_BOT_APP_ID }}
          private-key: ${{ secrets.GHA_BOT_APP_PRIVATE_KEY }}

      - name: Check subscription policy files
        uses: ./.github/actions/policy-file-generator
        with:
          token: ${{ steps.app-token.outputs.token }}
