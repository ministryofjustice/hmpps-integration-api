name: Test

on:
  pull_request:
    branches:
      - main
  workflow_call:

#concurrency:
#  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
#  cancel-in-progress: true

jobs:
  ktlint-check:
    name: KtLintCheck
    runs-on: ubuntu-latest
#    needs: gradle_build
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run ktlintCheck
        run: make lint
  unit_test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: ktlint-check
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
#      - name: Update hosts
#        run: |
#          echo '172.0.0.1  linuxkit-0abce6d12181' >> /etc/hosts
#        shell: bash
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run unit tests
        shell: bash
        run: make unit-test
      - name: Upload raw test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            build/test-results
            build/reports/tests
      - name: Publish Test Report
        uses: ctrf-io/github-test-reporter@a63590595a9ae45cb646c55a314110f910d360d2
        with:
          report-path: './build/test-results/unitTest/*.xml'
          use-suite-name: true
          integrations-config: |
            {
              "junit-to-ctrf": {
                "enabled": true,
                "action": "convert",
                "options": {
                  "output": "./ctrf-reports/ctrf-report.json",
                  "toolname": "junit-to-ctrf",
                  "useSuiteName": true,
                  "env": {
                    "appName": "approved-premises-api"
                  }
                }
              }
            }
        if: always()


  integration_test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: ktlint-check
    strategy:
      fail-fast: false
      matrix:
        shard: [ 1, 2, 3, 4, 5, 6 ]
    env:
      _JAVA_OPTIONS: "-Xmx2g -XX:MaxMetaspaceSize=1g -XX:ParallelGCThreads=2 -XX:ConcGCThreads=2 -Djava.util.concurrent.ForkJoinPool.common.parallelism=2 -Dkotlin.compiler.execution.strategy=in-process"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=1"
#      POSTGRES_PORT: 5432
#      SPRING_DATA_REDIS_PORT: 6379
#    services:
#      localstack:
#        image: localstack/localstack:3.4.0
#        ports:
#          - 4566:4566
#          - 4571:4571
#        env:
#          ES_PORT_EXTERNAL: 4571
#          DOCKER_HOST: 'unix:///var/run/docker.sock'
#          AWS_EXECUTION_ENV: True
#          PERSISTENCE: 1
#          SERVICES: sns,sqs
#          DEFAULT_REGION: eu-west-2
#          DATA_DIR: /tmp/localstack/data
#        volumes:
#          - "./localstack:/var/lib/localstack"
#          - "/var/run/docker.sock:/var/run/docker.sock"
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
#      - name: Determine tests splitting
#        uses: chaosaffe/split-tests@v1
#        id: split-tests
#        with:
#          glob: src/test/kotlin/**/integration/**/*Test.kt
#          split-index: ${{ strategy.job-index }}
#          split-total: ${{ strategy.job-total }}
      - name: Run integration test
        run: make integration-test
      - name: Upload raw test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ matrix.shard }}-of-${{ strategy.job-total }}
          path: |
            build/test-results
            build/reports/tests

      - name: Publish Test Report
        uses: ctrf-io/github-test-reporter@a63590595a9ae45cb646c55a314110f910d360d2
        with:
          report-path: './build/test-results/integrationTest/*.xml'
          use-suite-name: true
          integrations-config: |
            {
              "junit-to-ctrf": {
                "enabled": true,
                "action": "convert",
                "options": {
                  "output": "./ctrf-reports/ctrf-report.json",
                  "toolname": "junit-to-ctrf",
                  "useSuiteName": true,
                  "env": {
                    "appName": "approved-premises-api"
                  }
                }
              }
            }
        if: always()
