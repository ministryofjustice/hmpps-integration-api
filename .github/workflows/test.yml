name: Test

on:
  pull_request:
  workflow_call:
jobs:
  ktlint-check:
    name: KtLintCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # V6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # V5
        with:
          distribution: 'temurin'
          java-version: 25
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Run ktlintCheck
        run: make lint
  helm_lint:
    strategy:
      matrix:
        environments: ['dev', 'preprod', 'prod']
    name: helm lint
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/test_helm_lint.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      environment: ${{ matrix.environments }}
  detekt:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: 25
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Run detekt
        run: ./gradlew detekt
      - name: Upload raw test reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: detekt results
          path: |
            build/reports/detekt
  unit_test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: 25
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Run Unit Tests
        shell: bash
        run: TEST_TYPE="UNIT" ./gradlew koverBinaryReport
      - name: Upload raw test reports on failure
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit_test_results
          path: |
            build/classes
            build/test-results
            build/kover
            build/reports/tests
      - name: Publish Test Report
        uses: ctrf-io/github-test-reporter@0f299074936c32ccaab5be5230511f6b2b9080aa
        with:
          report-path: './build/test-results/unitTest/*.xml'
          use-suite-name: true
          integrations-config: |
            {
              "junit-to-ctrf": {
                "enabled": true,
                "action": "convert",
                "options": {
                  "output": "./ctrf-reports/ctrf-report.json",
                  "toolname": "junit-to-ctrf",
                  "useSuiteName": true,
                  "env": {
                    "appName": "hmpps-integration-api"
                  }
                }
              }
            }
        if: always()
  integration_test:
    name: Integration Test
    runs-on: ubuntu-latest
    env:
      _JAVA_OPTIONS: "-Xmx2g"
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: 25
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Serve Dependencies
        run: make serve-dependencies
      - name: Run Integration Tests
        run: TEST_TYPE="INT" ./gradlew koverXmlReport
      - name: Upload raw test reports on failure
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration_test_results
          path: |
            build/classes
            build/test-results
            build/reports/tests
            build/kover
      - name: Publish Test Report
        uses: ctrf-io/github-test-reporter@0f299074936c32ccaab5be5230511f6b2b9080aa
        with:
          report-path: './build/test-results/integrationTest/*.xml'
          use-suite-name: true
          integrations-config: |
            {
              "junit-to-ctrf": {
                "enabled": true,
                "action": "convert",
                "options": {
                  "output": "./ctrf-reports/ctrf-report.json",
                  "toolname": "junit-to-ctrf",
                  "useSuiteName": true,
                  "env": {
                    "appName": "hmpps-integration-api"
                  }
                }
              }
            }
        if: always()
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [integration_test, unit_test]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: 25
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: download the unit_test coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unit_test_results
          path: |
            unit_test_results/
      - name: download the integration_test coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: integration_test_results
          path: |
            integration_test_results/
      - name: Copy coverage files
        shell: bash
        run: |
          mkdir ${{ github.workspace }}/lib
          mkdir ${{ github.workspace }}/build
          cp -rf ${{ github.workspace }}/unit_test_results/classes ${{ github.workspace }}/build/.
          cp ${{ github.workspace }}/unit_test_results/kover/bin-reports/unitTest.ic ${{ github.workspace }}/lib/.
          cp ${{ github.workspace }}/integration_test_results/kover/bin-reports/integrationTest.ic ${{ github.workspace }}/lib/.
      - name: Copy coverage files
        run: ./gradlew createCoverageReport
      - name: Add coverage report to PR
        id: kover
        uses: mi-kas/kover-report@e44de7f5f7a878ba9d0070c86aa5c470efd5e2d1 # v2.2
        with:
          path: |
            ${{ github.workspace }}/coverage/report.xml
          title: Code Coverage
          update-comment: true
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          coverage-counter-type: LINE
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: |
            coverage
