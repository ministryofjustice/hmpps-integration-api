name: Security Scanning
on: pull_request

jobs:
  security-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.18.2"
          # Pinned SHA256 checksum for v8.18.2 linux_x64

          curl -sSLo gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz

          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          rm gitleaks.tar.gz

      - name: Run Gitleaks Scan
        run: |
          gitleaks detect --verbose --redact --log-opts="${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
