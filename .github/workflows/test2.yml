name: Test2

on:
  push:
    branches:
      - 'HIA-1388_parallel_test_poc'
jobs:
  full_test:
    name: Full Test
    runs-on: ubuntu-latest
    env:
      _JAVA_OPTIONS: "-Xmx1g"
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: 25
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Serve Dependencies
        run: make serve-dependencies
      - name: Run Tests
        run: TEST_TYPE="INT" ./gradlew fulltest koverXmlReport createCoverageReport
      - name: Upload raw test reports on failure
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration_test_results
          path: |
            build/classes
            build/test-results
            build/reports/tests
            build/kover
      - name: Publish Test Report
        uses: ctrf-io/github-test-reporter@e500b992f936420eb633c91644cf10d4d71df700
        with:
          report-path: './build/test-results/integrationTest/*.xml'
          use-suite-name: true
          integrations-config: |
            {
              "junit-to-ctrf": {
                "enabled": true,
                "action": "convert",
                "options": {
                  "output": "./ctrf-reports/ctrf-report.json",
                  "toolname": "junit-to-ctrf",
                  "useSuiteName": true,
                  "env": {
                    "appName": "hmpps-integration-api"
                  }
                }
              }
            }
        if: always()
      - name: Add coverage report to PR
        id: kover
        uses: mi-kas/kover-report@db9938358b8e1e6175dd4136132bf4eb7aa4ae6d # v2.4
        with:
          path: |
            ${{ github.workspace }}/coverage/report.xml
          title: Code Coverage
          update-comment: true
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          coverage-counter-type: LINE
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: |
            coverage


