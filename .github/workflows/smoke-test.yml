name: Smoke Test

on:
  push:
    branches:
      - 'HIA-857-GHA-smoke-tests'
  workflow_call:
jobs:
  dev-smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup K6
        uses: grafana/setup-k6-action@v1
      - name: Run Main profile
        uses: grafana/run-k6-action@v1
        env:
          FULL_ACCESS_CERT: ${{ secrets.DEV_SMOKE_TEST_FULL_ACCESS_CERT }}
          FULL_ACCESS_KEY: ${{ secrets.DEV_SMOKE_TEST_FULL_ACCESS_KEY }}
          FULL_ACCESS_API_KEY: ${{ secrets.DEV_SMOKE_TEST_FULL_ACCESS_API_KEY }}
        with:
          path: scripts/K6/smoke-tests.js -e PROFILE=MAIN

      - name: Run No access
        uses: grafana/run-k6-action@v1
        env:
          NO_ACCESS_CERT: ${{ secrets.DEV_SMOKE_TEST_NO_ACCESS_CERT }}
          NO_ACCESS_KEY: ${{ secrets.DEV_SMOKE_TEST_NO_ACCESS_KEY }}
          NO_ACCESS_API_KEY: ${{ secrets.DEV_SMOKE_TEST_NO_ACCESS_API_KEY }}
        with:
          path: scripts/K6/smoke-tests.js -e PROFILE=NO_ACCESS

      - name: Run Restricted access
        uses: grafana/run-k6-action@v1
        env:
          NO_ACCESS_CERT: ${{ secrets.DEV_SMOKE_TEST_NO_ACCESS_CERT }}
          NO_ACCESS_KEY: ${{ secrets.DEV_SMOKE_TEST_NO_ACCESS_KEY }}
          NO_ACCESS_API_KEY: ${{ secrets.DEV_SMOKE_TEST_NO_ACCESS_API_KEY }}
        with:
          path: scripts/K6/smoke-tests.js -e PROFILE=LIMITED
