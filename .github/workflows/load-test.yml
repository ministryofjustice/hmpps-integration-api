name: Load Test
on:
  push:
    branches:
      - HIA-916-test-api-gw-usage-plan
  workflow_dispatch:
jobs:
  dev-load-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # V7.0.1
      - name: Setup K6
        uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # V1
      - name: Run dev load Test script (progressive load for 30s)
        shell: bash
        env:
          PROFILE: PROGRESSIVE_LOAD
          DOMAIN: dev.integration-api.hmpps.service.justice.gov.uk
          CERT: "${{ secrets.DEV_SMOKE_TEST_FULL_ACCESS_CERT }}"
          PRIVATE_KEY: "${{ secrets.DEV_SMOKE_TEST_FULL_ACCESS_KEY }}"
          API_KEY: "${{ secrets.DEV_SMOKE_TEST_FULL_ACCESS_API_KEY }}"
        run: |
          k6 run --summary-mode=full --quiet ./scripts/K6/load-tests.js
