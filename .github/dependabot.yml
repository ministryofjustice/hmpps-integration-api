version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
      exclude:
        - "uk.gov.justice.*"
    groups:
      minor:
        update-types:
          - "major"
          - "minor"
          - "patch"
        patterns:
          - "*"
    ignore:
       # Ignore this version of kover-cli"
      - dependency-name: "org.jetbrains.kotlinx:kover-cli"
        versions: [ "1.0.715" ]
      - dependency-name: "org.jetbrains.kotlinx.kover:org.jetbrains.kotlinx.kover.gradle.plugin"
        versions: [ "1.0.715" ]

  - package-ecosystem: "bundler"
    directory: "/tech-docs"
    schedule:
      interval: "weekly"
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      minor:
        update-types:
          - "major"
          - "minor"
          - "patch"
        patterns:
          - "*"
    ignore:
      # Ignore this because updating breaks the tech-docs
      # I am unsure currently what the cause of this is
      - dependency-name: "middleman"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 30 # Covers major
      exclude:
        - "ministryofjustice/*"
    groups:
      minor:
        cooldown:
          default-days: 7
        update-types:
          - "minor"
        patterns:
          - "*"
      patch:
        cooldown:
          default-days: 7
        update-types:
          - "minor"
        patterns:
          - "*"

