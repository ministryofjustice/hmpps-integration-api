name: Format code
description: Identify subscription filter policy changes and commit

inputs:
  commit_message:
    description: Commit message
    default: Subscription Filter Policy Changes
  token:
    description: GitHub token to use for pushing changes. Defaults to GitHub actions token.

runs:
  using: "composite"
  steps:
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: 25
        distribution: 'temurin'
    - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
    - name: Use GitHub token
      if: inputs.token == 'github'
      shell: bash
      run: echo "token=${{ github.token }}" >> $GITHUB_ENV
    - name: Use provided token
      if: inputs.token != 'github'
      shell: bash
      run: echo "token=${token}" >> $GITHUB_ENV
      env:
        token: ${{ inputs.token }}
    - name: Checkout pull request
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      if: github.event_name == 'pull_request'
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        token: ${{ env.token }}
    - name: Checkout branch
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      if: github.event_name != 'pull_request'
      with:
        ref: ${{ github.ref }}
        token: ${{ env.token }}
    - name: Check for subscription filter policy file changes
      shell: bash
      run: |
        ./gradlew generateFilterPolicies
    - name: Stage changes
      shell: bash
      run: |
        git add src/main/resources/event-filter-policies/.
    - name: Commit and push
      uses: dsanders11/github-app-commit-action@43de6da2f4d927e997c0784c7a0b61bd19ad6aac # v1.5.0
      with:
        fail-on-no-changes: false
        message: ${{ inputs.commit_message }}
        token: ${{ env.token }}
